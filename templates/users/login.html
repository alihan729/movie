{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="p-4 rounded" style="background: #1a1a1a; border: 1px solid #2a2a2a;">
            <h2 class="text-center mb-4">🎬 Войти</h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label" style="color: #888;">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 mt-2">Войти</button>
            </form>
            <p class="text-center mt-3" style="color: #888;">
                Нет аккаунта?
                <a href="{% url 'register' %}" style="color: #e50914;">Зарегистрироваться</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
