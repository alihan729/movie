<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MovieTracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
        }
        .navbar {
            background: linear-gradient(90deg, #1a1a2e, #16213e) !important;
            border-bottom: 1px solid #e50914;
        }
        .navbar-brand {
            color: #e50914 !important;
            font-weight: 700;
            font-size: 1.4rem;
        }
        .nav-link {
            color: #e0e0e0 !important;
        }
        .nav-link:hover {
            color: #e50914 !important;
        }
        .card {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.3);
        }
        .card-body {
            background-color: #1a1a1a;
        }
        .btn-primary {
            background-color: #e50914;
            border-color: #e50914;
        }
        .btn-primary:hover {
            background-color: #b20710;
            border-color: #b20710;
        }
        .btn-outline-primary {
            color: #e50914;
            border-color: #e50914;
        }
        .btn-outline-primary:hover {
            background-color: #e50914;
            border-color: #e50914;
        }
        .badge.bg-primary {
            background-color: #e50914 !important;
        }
        .form-control, .form-select {
            background-color: #2a2a2a;
            border-color: #3a3a3a;
            color: #e0e0e0;
        }
        .form-control:focus, .form-select:focus {
            background-color: #2a2a2a;
            border-color: #e50914;
            color: #e0e0e0;
            box-shadow: 0 0 0 0.2rem rgba(229, 9, 20, 0.25);
        }
        .border {
            border-color: #2a2a2a !important;
        }
        h1, h2, h3, h4, h5 {
            color: #ffffff;
        }
        a {
            color: #e0e0e0;
        }
        a:hover {
            color: #e50914;
        }
        .text-muted {
            color: #888 !important;
        }
        .card-header {
            border-bottom: 1px solid #2a2a2a;
        }
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 60px 0;
            margin-bottom: 40px;
            border-bottom: 2px solid #e50914;
        }
        .search-input {
            background-color: #2a2a2a !important;
            border: 2px solid #3a3a3a !important;
            color: #e0e0e0 !important;
            font-size: 1.1rem;
        }
        .search-input:focus {
            border-color: #e50914 !important;
            box-shadow: none !important;
        }
        .movie-card img {
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">🎬 MovieTracker</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <a class="nav-link" href="{% url 'profile' %}">👤 <a class="nav-link" href="{% url 'recommendations' %}">🎯 Рекомендации</a> {{ user.username }}</a>
                     <a class="nav-link" href="{% url 'genre_search' %}">🎭 Жанры</a>
                    <a class="nav-link" href="{% url 'logout' %}">Выйти</a>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Войти</a>
                    <a class="nav-link" href="{% url 'register' %}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
